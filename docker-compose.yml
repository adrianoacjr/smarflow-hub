services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smartflow-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - smartnet

  alembic:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smartflow-alembic
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/app:/app
      - ./backend/migrations:/app/migrations
      - ./backend/alembic.ini:/app/alembic.ini
    working_dir: /app
    command: alembic upgrade head
    restart: "no"
    networks:
      - smartnet

  frontend:
    build: ./frontend
    container_name: smartflow-frontend
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/vite.config.ts:/app/vite.config.ts
    depends_on:
      - backend
    restart: always
    networks:
      - smartnet

  postgres:
    image: postgres:16
    container_name: smartflow_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - smartnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:

networks:
  smartnet:
    name: smartnet
    driver: bridge
